# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name zqytg.online www.zqytg.online;
    return 301 https://zqytg.online$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl;
    server_name zqytg.online www.zqytg.online;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/zqytg.online_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/zqytg.online.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 博客前台
    location / {
        root /var/www/blog/web/blog;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 后台管理
    location /admin {
        root /var/www/blog/web;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
}