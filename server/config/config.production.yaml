server:
  port: 8080
  mode: release # 生产环境使用 release

database:
  host: 127.0.0.1
  port: 3306
  user: blog
  password: 'your_secure_password_here' # 修改为实际密码
  name: blog
  charset: utf8mb4

jwt:
  secret: 'change-this-to-a-long-random-string-in-production' # 生产环境必须修改
  expire: 7200
  refresh_expire: 604800

upload:
  path: /var/www/blog/uploads # 生产环境路径
  max_size: 10485760
  allowed_types:
    - image/jpeg
    - image/png
    - image/gif
    - image/webp

blog:
  base_url: https://zqytg.online # 生产环境域名
