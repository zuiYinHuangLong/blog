name: Build and Deploy Backend

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'server/**'

env:
  GO_VERSION: '1.22'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: 缓存 Go 模块
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 安装后端依赖
        working-directory: server
        run: go mod download

      - name: 构建后端（Linux amd64）
        working-directory: server
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o blog-server .

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: blog-server-${{ github.sha }}
          path: server/blog-server
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: blog-server-${{ github.sha }}

      - name: 部署到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'blog-server'
          target: ${{ secrets.DEPLOY_PATH }}/server
          overwrite: true

      - name: 重启后端服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}/server

            # 停止旧进程
            pkill -f blog-server || true
            sleep 2

            # 赋予执行权限
            chmod +x blog-server

            # 启动新进程
            nohup ./blog-server > ../blog-server.log 2>&1 &

            # 验证启动
            sleep 3
            if pgrep -f blog-server > /dev/null; then
              echo "✅ 后端服务启动成功"
            else
              echo "❌ 后端服务启动失败"
              tail -n 50 ../blog-server.log
              exit 1
            fi
